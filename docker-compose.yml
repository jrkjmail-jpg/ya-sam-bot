services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: yasam
      POSTGRES_USER: yasam
      POSTGRES_PASSWORD: yasam
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://yasam:yasam@db:5432/yasam
      API_BASE_URL: http://localhost:8000
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db

  bot:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://yasam:yasam@db:5432/yasam
      API_BASE_URL: http://api:8000
    command: python -m bot.main
    volumes:
      - .:/app
    depends_on:
      - api

volumes:
  postgres_data:
